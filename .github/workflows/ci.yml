name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: build + test ─────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       storelense_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build common module
        working-directory: backend
        run: mvn install -pl common -DskipTests -q

      - name: Build & test all services
        working-directory: backend
        run: mvn verify -DskipTests -q
        # Integration tests require running infra; run only unit tests in CI for now
        env:
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     storelense_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          REDIS_HOST:  localhost
          REDIS_PORT:  6379
          JWT_SECRET:  ci-secret-key-min-32-characters-ok

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/**/target/surefire-reports/

  # ─── Frontend: lint + type-check + build ──────────────────────────────────
  frontend:
    name: Frontend — Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
          NEXT_PUBLIC_WS_URL:       ws://localhost:8091/ws

  # ─── Docker: build all images (validate Dockerfiles) ─────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend images (matrix)
        run: |
          SERVICES=(
            "auth-service:8081"
            "store-service:8082"
            "product-service:8083"
            "inventory-service:8084"
            "soh-service:8085"
            "refill-service:8086"
            "rfid-ingest-service:8087"
            "rfid-processing-service:8088"
            "reporting-service:8089"
            "erp-integration-service:8090"
            "notification-service:8091"
          )
          for svc_port in "${SERVICES[@]}"; do
            svc="${svc_port%%:*}"
            port="${svc_port##*:}"
            echo "Building $svc..."
            docker buildx build \
              --build-arg SERVICE_NAME="$svc" \
              --build-arg SERVICE_PORT="$port" \
              --tag "storelense/$svc:ci" \
              --load \
              ./backend
          done

      - name: Build frontend image
        run: |
          docker buildx build \
            --tag storelense/frontend:ci \
            --load \
            ./frontend
