apiVersion: 1

datasources:

  - name:      Prometheus
    type:      prometheus
    url:       http://prometheus:9090
    isDefault: true
    access:    proxy
    jsonData:
      timeInterval:         15s
      httpMethod:           POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: loki

  - name:   Loki
    type:   loki
    url:    http://loki:3100
    access: proxy
    jsonData:
      maxLines: 1000
      derivedFields:
        - name:          service
          matcherRegex:  '"service":"([^"]+)"'
          url:           ''
