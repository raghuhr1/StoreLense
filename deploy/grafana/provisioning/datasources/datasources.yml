apiVersion: 1

datasources:

  - name:      Prometheus
    type:      prometheus
    uid:       storelense-prometheus
    url:       http://prometheus:9090
    isDefault: true
    access:    proxy
    jsonData:
      timeInterval: 15s
      httpMethod:   POST

  - name:   Loki
    type:   loki
    uid:    storelense-loki
    url:    http://loki:3100
    access: proxy
    jsonData:
      maxLines: 1000
