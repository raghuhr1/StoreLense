server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Docker container logs via Docker socket ───────────────────────────────────
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name:   label
            values: ["com.docker.compose.project=storelense"]

    relabel_configs:
      # Container name (strip leading slash)
      - source_labels: [__meta_docker_container_name]
        regex:         '/(.*)'
        target_label:  container

      # Compose service name (cleaner label for Grafana)
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label:  service

      # Compose project
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label:  compose_project

    pipeline_stages:
      # Parse Docker JSON log wrapper
      - json:
          expressions:
            log:    log
            stream: stream
            time:   time

      - labels:
          stream:

      # Extract Spring Boot log level if present
      - regex:
          expression: '^\s*(?P<timestamp>\S+)\s+(?P<level>ERROR|WARN|INFO|DEBUG|TRACE)\s+'
          source:     log

      - labels:
          level:

      # Use original log line as output
      - output:
          source: log

  # ── Observability stack own logs ──────────────────────────────────────────────
  - job_name: obs-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
        filters:
          - name:   label
            values: ["com.docker.compose.project=storelense-obs"]

    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label:  service
      - source_labels: [__meta_docker_container_name]
        regex:         '/(.*)'
        target_label:  container

    pipeline_stages:
      - json:
          expressions:
            log: log
      - output:
          source: log
