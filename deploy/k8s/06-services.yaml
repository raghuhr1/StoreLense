# All 11 Spring Boot microservice Deployments + ClusterIP Services
# Image tags are updated by the CD pipeline to the SHA being deployed.

# ─── Shared env helpers (referenced via envFrom) ─────────────────────────────
# Each deployment loads storelense-config (ConfigMap) + storelense-secrets (Secret)

# ════════════════════════════════════════════════════════════════════════════
# AUTH SERVICE  (port 8081)
# ════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: storelense
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/storelense/storelense-auth-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef: { name: storelense-config }
            - secretRef:    { name: storelense-secrets }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests: { memory: 256Mi, cpu: 250m }
            limits:   { memory: 512Mi, cpu: "1" }
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: storelense
spec:
  selector: { app: auth-service }
  ports:
    - port: 8081
---
