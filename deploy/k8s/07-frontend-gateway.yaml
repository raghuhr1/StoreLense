# ─── nginx API Gateway ────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: storelense
data:
  nginx.conf: |
    worker_processes auto;
    events { worker_connections 1024; }
    http {
      upstream auth-service         { server auth-service:8081; }
      upstream store-service        { server store-service:8082; }
      upstream product-service      { server product-service:8083; }
      upstream inventory-service    { server inventory-service:8084; }
      upstream soh-service          { server soh-service:8085; }
      upstream refill-service       { server refill-service:8086; }
      upstream rfid-ingest-service  { server rfid-ingest-service:8087; }
      upstream reporting-service    { server reporting-service:8089; }
      upstream erp-service          { server erp-integration-service:8090; }
      upstream notification-service { server notification-service:8091; }
      limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
      server {
        listen 8080;
        location = /health { return 200 '{"status":"UP"}'; add_header Content-Type application/json; }
        location ~ ^/api/(auth|users)(/|$) { limit_req zone=api burst=20 nodelay; proxy_pass http://auth-service; }
        location /api/stores    { proxy_pass http://store-service; }
        location /api/products  { proxy_pass http://product-service; }
        location /api/inventory { proxy_pass http://inventory-service; }
        location /api/soh       { proxy_pass http://soh-service; }
        location /api/refill    { proxy_pass http://refill-service; }
        location /api/rfid      { limit_req zone=api burst=200 nodelay; proxy_pass http://rfid-ingest-service; }
        location /api/reporting { proxy_pass http://reporting-service; proxy_read_timeout 60s; }
        location /api/erp       { proxy_pass http://erp-service; }
        location /ws {
          proxy_pass http://notification-service;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: storelense
spec:
  replicas: 2
  selector:
    matchLabels: { app: nginx-gateway }
  template:
    metadata:
      labels: { app: nginx-gateway }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { memory: 64Mi,  cpu: 100m }
            limits:   { memory: 256Mi, cpu: 500m }
      volumes:
        - name: config
          configMap: { name: nginx-config }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: storelense
spec:
  selector: { app: nginx-gateway }
  ports:
    - port: 8080
---
# ─── Frontend ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: storelense
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/storelense/storelense-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - { name: NEXT_PUBLIC_API_BASE_URL, value: "https://api.storelense.internal" }
            - { name: NEXT_PUBLIC_WS_URL,       value: "wss://api.storelense.internal/ws" }
            - { name: INTERNAL_API_URL,         value: "http://nginx-gateway:8080" }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { memory: 256Mi, cpu: 200m }
            limits:   { memory: 512Mi, cpu: "1" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: storelense
spec:
  selector: { app: frontend }
  ports:
    - port: 3000
