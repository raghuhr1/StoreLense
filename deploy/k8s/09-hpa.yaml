# Horizontal Pod Autoscalers
# rfid-processing-service scales aggressively to handle burst RFID ingest
# Other services scale conservatively

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rfid-processing-hpa
  namespace: storelense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rfid-processing-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rfid-ingest-hpa
  namespace: storelense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rfid-ingest-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: storelense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
