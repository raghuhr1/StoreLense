apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
  namespace: storelense
spec:
  serviceName: zookeeper
  replicas: 1
  selector:
    matchLabels: { app: zookeeper }
  template:
    metadata:
      labels: { app: zookeeper }
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.1
          env:
            - { name: ZOOKEEPER_CLIENT_PORT, value: "2181" }
            - { name: ZOOKEEPER_TICK_TIME,   value: "2000" }
          ports:
            - containerPort: 2181
          resources:
            requests: { memory: 256Mi, cpu: 250m }
            limits:   { memory: 512Mi, cpu: 500m }
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: storelense
spec:
  clusterIP: None
  selector: { app: zookeeper }
  ports:
    - port: 2181
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: storelense
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.1
          env:
            - { name: KAFKA_BROKER_ID,                        value: "1" }
            - { name: KAFKA_ZOOKEEPER_CONNECT,                value: zookeeper:2181 }
            - { name: KAFKA_ADVERTISED_LISTENERS,             value: PLAINTEXT://kafka:9092 }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE,        value: "true" }
          ports:
            - containerPort: 9092
          readinessProbe:
            exec:
              command: ["kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          resources:
            requests: { memory: 512Mi, cpu: 500m }
            limits:   { memory: 2Gi,   cpu: "2" }
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests: { storage: 10Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: storelense
spec:
  clusterIP: None
  selector: { app: kafka }
  ports:
    - port: 9092
