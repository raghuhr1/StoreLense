global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: production
    app: storelense

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:

  # ── Spring Boot microservices (/actuator/prometheus) ─────────────────────────
  - job_name: storelense-services
    metrics_path: /actuator/prometheus
    scrape_interval: 30s
    static_configs:
      - targets:
          - auth-service:8081
          - store-service:8082
          - product-service:8083
          - inventory-service:8084
          - soh-service:8085
          - refill-service:8086
          - rfid-ingest-service:8087
          - rfid-processing-service:8088
          - reporting-service:8089
          - erp-integration-service:8090
          - notification-service:8091
        labels:
          app: storelense

  # ── Service health probes (/actuator/health) ──────────────────────────────────
  - job_name: storelense-health
    metrics_path: /actuator/health
    scrape_interval: 30s
    static_configs:
      - targets:
          - auth-service:8081
          - store-service:8082
          - product-service:8083
          - inventory-service:8084
          - soh-service:8085
          - refill-service:8086
          - rfid-ingest-service:8087
          - rfid-processing-service:8088
          - reporting-service:8089
          - erp-integration-service:8090
          - notification-service:8091

  # ── Infrastructure exporters ──────────────────────────────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: storelense-server

  - job_name: cadvisor
    scrape_interval: 15s
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
