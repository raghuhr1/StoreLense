global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: production
    app: storelense

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:

  # ── Spring Boot microservices ─────────────────────────────────────────────────
  # Scraped on port 9000 (MANAGEMENT_SERVER_PORT). /actuator/** is permitted
  # without auth by the @Order(1) actuatorSecurityChain in ServiceSecurityConfig.
  - job_name: storelense-services
    metrics_path: /actuator/prometheus
    scrape_interval: 30s
    static_configs:
      - targets:
          - auth-service:9000
          - store-service:9000
          - product-service:9000
          - inventory-service:9000
          - soh-service:9000
          - refill-service:9000
          - rfid-ingest-service:9000
          - rfid-processing-service:9000
          - reporting-service:9000
          - erp-integration-service:9000
          - notification-service:9000
        labels:
          app: storelense

  # ── Infrastructure exporters ──────────────────────────────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: storelense-server

  - job_name: cadvisor
    scrape_interval: 15s
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
