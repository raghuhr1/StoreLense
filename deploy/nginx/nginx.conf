worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Docker's internal DNS — resolve upstreams at request time, not at startup.
    # This prevents [emerg] host not found when a backend hasn't started yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Rate limit: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    server {
        listen 8080;
        server_name _;

        add_header 'Access-Control-Allow-Origin'  '*'                               always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Correlation-Id' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = /health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        # ── Auth & Users (auth-service:8081) ──────────────────────────────────
        location ~ ^/api/(auth|users)(/|$) {
            limit_req zone=api burst=20 nodelay;
            set $upstream http://auth-service:8081;
            proxy_pass         $upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Stores (store-service:8082) ───────────────────────────────────────
        location /api/stores {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://store-service:8082;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Products (product-service:8083) ───────────────────────────────────
        location /api/products {
            limit_req zone=api burst=20 nodelay;
            set $upstream http://product-service:8083;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Inventory (inventory-service:8084) ────────────────────────────────
        location /api/inventory {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://inventory-service:8084;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Inbound Shipments (inventory-service:8084) ────────────────────────
        location /api/inbound {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://inventory-service:8084;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Zone Intelligence (inventory-service:8084) ───────────────────────
        location /api/zone-intelligence {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://inventory-service:8084;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Replenishment Rules (inventory-service:8084) ─────────────────────
        location /api/replenishment-rules {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://inventory-service:8084;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Scan Rollup (inventory-service:8084) ─────────────────────────────
        location /api/scan-rollup {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://inventory-service:8084;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Zone Par Levels (inventory-service:8084) ─────────────────────────
        location /api/par-levels {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://inventory-service:8084;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Exceptions (inventory-service:8084) ──────────────────────────────
        location /api/exceptions {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://inventory-service:8084;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Cycle Counts (soh-service:8085) ──────────────────────────────────
        location /api/cycle-counts {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://soh-service:8085;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── SOH Sessions (soh-service:8085) ───────────────────────────────────
        location /api/soh {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://soh-service:8085;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Transfers (soh-service:8085) ──────────────────────────────────────
        location /api/transfers {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://soh-service:8085;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Refill Tasks (refill-service:8086) ────────────────────────────────
        location /api/refill {
            limit_req zone=api burst=10 nodelay;
            set $upstream http://refill-service:8086;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── RFID Ingest (rfid-ingest-service:8087) ────────────────────────────
        location /api/rfid {
            limit_req zone=api burst=200 nodelay;
            set $upstream http://rfid-ingest-service:8087;
            proxy_pass         $upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Reporting (reporting-service:8089) ────────────────────────────────
        location /api/reporting {
            limit_req zone=api burst=5 nodelay;
            set $upstream http://reporting-service:8089;
            proxy_pass         $upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── ERP Integration (erp-integration-service:8090) ────────────────────
        location /api/erp {
            limit_req zone=api burst=5 nodelay;
            set $upstream http://erp-integration-service:8090;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Reconciliation (erp-integration-service:8090) ─────────────────────
        location /api/reconciliation {
            limit_req zone=api burst=5 nodelay;
            set $upstream http://erp-integration-service:8090;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── WebSocket — Notification (notification-service:8091) ─────────────
        location /ws {
            set $upstream http://notification-service:8091;
            proxy_pass          $upstream;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
        }

        # ── Actuator health endpoints (internal only) ─────────────────────────
        location /actuator {
            deny all;
            return 403;
        }
    }
}
