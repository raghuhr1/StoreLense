worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream auth-service         { server host.docker.internal:8081; }
    upstream store-service        { server host.docker.internal:8082; }
    upstream product-service      { server host.docker.internal:8083; }
    upstream inventory-service    { server host.docker.internal:8084; }
    upstream soh-service          { server host.docker.internal:8085; }
    upstream refill-service       { server host.docker.internal:8086; }
    upstream rfid-ingest-service  { server host.docker.internal:8087; }
    upstream rfid-processing      { server host.docker.internal:8088; }
    upstream reporting-service    { server host.docker.internal:8089; }
    upstream erp-service          { server host.docker.internal:8090; }
    upstream notification-service { server host.docker.internal:8091; }

    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    server {
        listen 8080;
        server_name _;

        add_header 'Access-Control-Allow-Origin'  '*'                         always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,PATCH,DELETE,OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Correlation-Id' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = /health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        location ~ ^/api/(auth|users|roles)(/|$) {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://auth-service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /api/stores {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://store-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/products {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://product-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/inventory {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://inventory-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/soh {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://soh-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/refill {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://refill-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/rfid {
            limit_req zone=api burst=200 nodelay;
            proxy_pass         http://rfid-ingest-service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /api/reporting {
            limit_req zone=api burst=5 nodelay;
            proxy_pass         http://reporting-service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /api/erp {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://erp-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws {
            proxy_pass          http://notification-service;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
        }

        location /actuator {
            deny all;
            return 403;
        }
    }
}
