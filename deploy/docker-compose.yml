name: storelense

# ─── Common build context for all backend services ───────────────────────────
x-backend-build: &backend-build
  context: ../backend
  dockerfile: Dockerfile

# ─── Common Spring Boot environment ──────────────────────────────────────────
x-spring-env: &spring-env
  DB_HOST:     postgres
  DB_PORT:     "5432"
  DB_NAME:     ${DB_NAME:-storelense}
  DB_USERNAME: ${DB_USERNAME:-storelense_app}
  DB_PASSWORD: ${DB_PASSWORD:-changeme}
  REDIS_HOST:  redis
  REDIS_PORT:  "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  KAFKA_BOOTSTRAP: kafka:9092
  JWT_SECRET:  ${JWT_SECRET:-storelense-dev-secret-key-minimum-32-chars}
  PRODUCT_SERVICE_URL: http://product-service:8083
  STORE_SERVICE_URL:   http://store-service:8082
  # Separate management port — not exposed to host; Prometheus reaches it inside Docker network
  MANAGEMENT_SERVER_PORT: "9000"

# ─── Healthcheck defaults ────────────────────────────────────────────────────
x-spring-healthcheck: &spring-healthcheck
  interval: 20s
  timeout:  10s
  retries:  5
  start_period: 180s

# ─── Log limits (150 MB max per container) ───────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME:-storelense}
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_PASSWORD:       ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/set-app-password.sh:/docker-entrypoint-initdb.d/set-app-password.sh:ro
    ports:
      - "5432:5432"
    logging: *default-logging
    healthcheck:
      test:         ["CMD", "pg_isready", "-U", "postgres", "-d", "storelense"]
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 15s

  redis:
    image: redis:7-alpine
    command: redis-server --save 20 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru --ignore-warnings ARM64-COW-BUG
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    logging: *default-logging
    healthcheck:
      test:    ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  10

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_LOG_RETENTION_HOURS: "24"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      CLUSTER_ID: "storelense-kafka-cluster-01"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    logging: *default-logging
    healthcheck:
      test:         ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval:     15s
      timeout:      30s
      retries:      10
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # DB PASSWORD SYNC  (runs every startup — keeps storelense_app in sync with .env)
  # ═══════════════════════════════════════════════════════════════════════════

  db-init:
    image: postgres:16-alpine
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: >
      psql -h postgres -U postgres
      -c "ALTER USER storelense_app WITH PASSWORD '${DB_PASSWORD:-changeme}';"
    restart: "no"
    logging: *default-logging

  # ═══════════════════════════════════════════════════════════════════════════
  # MICROSERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  auth-service:
    build:
      <<: *backend-build
      args: { SERVICE_NAME: auth-service, SERVICE_PORT: 8081 }
    depends_on:
      db-init:  { condition: service_completed_successfully }
      redis:    { condition: service_healthy }
    environment:
      <<: *spring-env
    ports:
      - "8081:8081"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/actuator/health"]
      <<: *spring-healthcheck

  store-service:
    build:
      <<: *backend-build
      args: { SERVICE_NAME: store-service, SERVICE_PORT: 8082 }
    depends_on:
      db-init:  { condition: service_completed_successfully }
    environment:
      <<: *spring-env
    ports:
      - "8082:8082"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/actuator/health"]
      <<: *spring-healthcheck

  product-service:
    build:
      <<: *backend-build
      args: { SERVICE_NAME: product-service, SERVICE_PORT: 8083 }
    depends_on:
      db-init:  { condition: service_completed_successfully }
      redis:    { condition: service_healthy }
    environment:
      <<: *spring-env
    ports:
      - "8083:8083"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/actuator/health"]
      <<: *spring-healthcheck

  inventory-service:
    build:
      <<: *backend-build
      args: { SERVICE_NAME: inventory-service, SERVICE_PORT: 8084 }
    depends_on:
      db-init:  { condition: service_completed_successfully }
      kafka:    { condition: service_healthy }
    environment:
      <<: *spring-env
    ports:
      - "8084:8084"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/actuator/health"]
      <<: *spring-healthcheck

  soh-service:
    build:
      <<: *backend-build
      args: { SERVICE_NAME: soh-service, SERVICE_PORT: 8085 }
    depends_on:
      db-init:  { condition: service_completed_successfully }
      kafka:    { condition: service_healthy }
    environment:
      <<: *spring-env
    ports:
      - "8085:8085"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/actuator/health"]
      <<: *spring-healthcheck

  refill-service:
    build:
      <<: *backend-build
      args: { SERVICE_NAME: refill-service, SERVICE_PORT: 8086 }
    depends_on:
      db-init:  { condition: service_completed_successfully }
      kafka:    { condition: service_healthy }
    environment:
      <<: *spring-env
    ports:
      - "8086:8086"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/actuator/health"]
      <<: *spring-healthcheck

  rfid-ingest-service:
    build:
      <<: *backend-build
      args: { SERVICE_NAME: rfid-ingest-service, SERVICE_PORT: 8087 }
    depends_on:
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      <<: *spring-env
    ports:
      - "8087:8087"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/actuator/health"]
      <<: *spring-healthcheck

  rfid-processing-service:
    build:
      <<: *backend-build
      args: { SERVICE_NAME: rfid-processing-service, SERVICE_PORT: 8088 }
    depends_on:
      db-init:  { condition: service_completed_successfully }
      kafka:    { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      <<: *spring-env
    ports:
      - "8088:8088"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/actuator/health"]
      <<: *spring-healthcheck

  reporting-service:
    build:
      <<: *backend-build
      args: { SERVICE_NAME: reporting-service, SERVICE_PORT: 8089 }
    depends_on:
      db-init:  { condition: service_completed_successfully }
    environment:
      <<: *spring-env
    ports:
      - "8089:8089"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/actuator/health"]
      <<: *spring-healthcheck

  erp-integration-service:
    build:
      <<: *backend-build
      args: { SERVICE_NAME: erp-integration-service, SERVICE_PORT: 8090 }
    depends_on:
      db-init:  { condition: service_completed_successfully }
      kafka:    { condition: service_healthy }
    environment:
      <<: *spring-env
      ERP_BASE_URL:           ${ERP_BASE_URL:-http://localhost:9000}
      ERP_API_KEY:            ${ERP_API_KEY:-dev-key}
      ERP_API_VERSION:        ${ERP_API_VERSION:-v1}
      ERP_PUSH_SOH_ENABLED:   ${ERP_PUSH_SOH_ENABLED:-false}
    ports:
      - "8090:8090"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/actuator/health"]
      <<: *spring-healthcheck

  notification-service:
    build:
      <<: *backend-build
      args: { SERVICE_NAME: notification-service, SERVICE_PORT: 8091 }
    depends_on:
      kafka: { condition: service_healthy }
    environment:
      <<: *spring-env
    ports:
      - "8091:8091"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/actuator/health"]
      <<: *spring-healthcheck

  # ═══════════════════════════════════════════════════════════════════════════
  # API GATEWAY  (nginx — routes all /api/* to correct microservice)
  # ═══════════════════════════════════════════════════════════════════════════

  nginx-gateway:
    image: nginx:1.27-alpine
    depends_on:
      auth-service:            { condition: service_started }
      store-service:           { condition: service_started }
      product-service:         { condition: service_started }
      inventory-service:       { condition: service_started }
      soh-service:             { condition: service_started }
      refill-service:          { condition: service_started }
      rfid-ingest-service:     { condition: service_started }
      rfid-processing-service: { condition: service_started }
      reporting-service:       { condition: service_started }
      erp-integration-service: { condition: service_started }
      notification-service:    { condition: service_started }
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    logging: *default-logging
    healthcheck:
      test:         ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 15s

  # ═══════════════════════════════════════════════════════════════════════════
  # FRONTEND  (Next.js)
  # ═══════════════════════════════════════════════════════════════════════════

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      nginx-gateway: { condition: service_started }
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL:       ws://localhost:8091/ws
      INTERNAL_API_URL:         http://nginx-gateway:8080
    ports:
      - "3000:3000"
    logging: *default-logging
    healthcheck:
      test:    ["CMD", "wget", "-qO-", "http://localhost:3000/login"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  kafka_data:
