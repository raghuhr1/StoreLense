server:
  port: 8088

spring:
  application:
    name: rfid-processing-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:storelense}
    username: ${DB_USERNAME:storelense_app}
    password: ${DB_PASSWORD:changeme}
    hikari:
      schema: rfid
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: rfid
        jdbc.batch_size: 50          # batch INSERT for rfid_reads
        order_inserts: true
    open-in-view: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    listener:
      concurrency: 4               # 4 consumer threads per topic partition group
      ack-mode: record
    consumer:
      group-id: rfid-processing-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
      properties:
        fetch.min.bytes: 65536
        fetch.max.wait.ms: 100
        spring.json.trusted.packages: "com.storelense.*"
    producer:
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: 2
        batch.size: 65536

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

storelense:
  jwt:
    secret: ${JWT_SECRET:storelense-dev-secret-key-minimum-32-chars}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  services:
    product-service:
      url: ${PRODUCT_SERVICE_URL:http://product-service:8083}
    store-service:
      url: ${STORE_SERVICE_URL:http://store-service:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      service: rfid-processing-service

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.storelense.rfid.processing: INFO
    org.apache.kafka: WARN
