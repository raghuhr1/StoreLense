server:
  port: 8084

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:storelense}
    username: ${DB_USERNAME:storelense_app}
    password: ${DB_PASSWORD:changeme}
    hikari:
      schema: inventory
      maximum-pool-size: 15
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: inventory
    open-in-view: false
  flyway:
    schemas: inventory
    locations: classpath:db/migration
    validate-on-migrate: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    admin:
      fail-fast: false   # don't crash context if broker unreachable at startup
    consumer:
      group-id: inventory-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.storelense.*"

storelense:
  jwt:
    secret: ${JWT_SECRET:storelense-dev-secret-key-minimum-32-chars}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: inventory-service
