server:
  port: 8086

spring:
  application:
    name: refill-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:storelense}
    username: ${DB_USERNAME:storelense_app}
    password: ${DB_PASSWORD:changeme}
    hikari:
      schema: refill
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: refill
    open-in-view: false
  flyway:
    schemas: refill
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

storelense:
  jwt:
    secret: ${JWT_SECRET:storelense-dev-secret-key-minimum-32-chars}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: refill-service
